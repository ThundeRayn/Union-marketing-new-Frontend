<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/src/style.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display&family=Prata&family=Staatliches&display=swap" rel="stylesheet">

    <title>Union Marketing Official</title>
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #070707;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.6s ease-out;
      }
      #preloader.preloader-fade {
        opacity: 0;
        pointer-events: none;
      }
      .preloader-text {
        font-family: 'Prata', serif;
        color: white;
        font-size: 18px;
        letter-spacing: 0.15em;
        white-space: nowrap;
        overflow: hidden;
        border-right: 2px solid #fbc944;
        width: 0;
        animation: typing 1.5s steps(10) forwards, blink 0.6s step-end infinite;
      }
      .preloader-line {
        width: 200px;
        height: 1px;
        background: rgba(255,255,255,0.1);
        position: relative;
        overflow: hidden;
      }
      .preloader-line-inner {
        position: absolute;
        top: 0;
        left: 0;
        width: 40%;
        height: 100%;
        background: #fbc944;
        animation: oscillate 1.2s ease-in-out infinite alternate;
      }
      @keyframes typing {
        from { width: 0; }
        to { width: 10ch; }
      }
      @keyframes blink {
        50% { border-color: transparent; }
      }
      @keyframes oscillate {
        from { transform: translateX(0); }
        to { transform: translateX(300%); }
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-text">Loading...</div>
      <div class="preloader-line">
        <div class="preloader-line-inner"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
